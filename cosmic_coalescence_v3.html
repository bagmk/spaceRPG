<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Coalescence — MVP v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050505;
    --fg: #ece8d9;
    --muted: #6a6358;
    --accent: #ff6644;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* deepest background — fixed stars (very far away) */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 90% 20%, rgba(255,255,255,0.15), transparent);
    background-size: 800px 800px, 600px 600px, 700px 700px, 900px 900px;
    pointer-events: none;
    opacity: 0.3;
    z-index: 0;
  }

  #app {
    position: relative;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    z-index: 1;
  }

  #app.shake { animation: shake 0.55s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake {
    10%, 90% { transform: translate(-1px, 0); }
    20%, 80% { transform: translate(2px, 0); }
    30%, 50%, 70% { transform: translate(-4px, 1px); }
    40%, 60% { transform: translate(4px, -1px); }
  }
  #app.shake-big { animation: shakebig 0.7s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shakebig {
    10%, 90% { transform: translate(-2px, 0); }
    20%, 80% { transform: translate(5px, 1px); }
    30%, 50%, 70% { transform: translate(-9px, 2px); }
    40%, 60% { transform: translate(9px, -2px); }
  }

  /* === TIMELINE === */
  .timeline {
    padding: 18px 32px;
    display: flex; align-items: center; gap: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: linear-gradient(180deg, rgba(0,0,0,0.85), rgba(0,0,0,0.3));
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .tl-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.25em; text-transform: uppercase;
  }
  .tl-bar {
    flex: 1; height: 1px;
    background: rgba(255,255,255,0.1);
    position: relative;
  }
  .tl-fill {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    background: var(--accent);
    transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px var(--accent);
  }
  .tl-marker {
    position: absolute; width: 8px; height: 8px;
    background: var(--fg);
    border: 2px solid var(--accent);
    border-radius: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: left 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--accent);
  }
  .tl-time {
    font-size: 13px; color: var(--accent);
    min-width: 100px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .entropy-block, .combo-block {
    padding-left: 24px;
    border-left: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; gap: 2px;
  }
  .combo-block { min-width: 80px; opacity: 0; transition: opacity 0.3s; }
  .combo-block.active { opacity: 1; }
  .entropy-label, .combo-label {
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.25em; text-transform: uppercase;
  }
  .entropy-value {
    font-size: 16px;
    font-variant-numeric: tabular-nums;
  }
  .entropy-value sub { font-size: 10px; color: var(--muted); }
  .combo-value {
    font-family: var(--serif); font-style: italic;
    font-size: 18px; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  /* === FIELD === */
  .field {
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block; cursor: crosshair;
    width: 100%; height: 100%;
  }
  .stage-info {
    position: absolute; top: 28px; left: 32px;
    pointer-events: none; z-index: 5;
  }
  .stage-num {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.35em;
  }
  .stage-name {
    font-family: var(--serif);
    font-size: 36px; font-weight: 400;
    letter-spacing: -0.01em; margin-top: 4px;
    color: var(--fg);
  }
  .stage-hint {
    position: absolute; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.3em; text-transform: uppercase;
    pointer-events: none;
    animation: hintfade 3s ease-in-out infinite;
  }
  @keyframes hintfade {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  /* === ENCOUNTER ALERT === */
  .encounter-alert {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 7;
    text-align: center;
    animation: encounterIn 1.6s ease-out forwards;
  }
  .encounter-alert .ea-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .encounter-alert .ea-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 28px;
    color: var(--fg);
    text-shadow: 0 0 20px currentColor;
  }
  @keyframes encounterIn {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); letter-spacing: 0.6em; }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    35%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }

  /* === FLOATING NUMBERS === */
  .float-text {
    position: absolute;
    pointer-events: none;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.05em;
    z-index: 6;
    text-shadow: 0 0 10px var(--accent);
    transform: translate(-50%, -50%);
    animation: floatup 1s ease-out forwards;
    white-space: nowrap;
  }
  .float-text.crit {
    font-family: var(--serif); font-style: italic;
    font-size: 28px;
    color: #ffeecc;
    text-shadow: 0 0 20px var(--accent), 0 0 4px #fff;
    animation: floatcrit 1.4s ease-out forwards;
  }
  .float-text.collision {
    font-family: var(--serif); font-style: italic;
    font-size: 36px;
    color: #ffffff;
    text-shadow: 0 0 30px currentColor, 0 0 8px #fff;
    animation: floatcrit 2s ease-out forwards;
  }
  @keyframes floatup {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    15%  { opacity: 1; transform: translate(-50%, -65%) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%, -190%) scale(0.95); }
  }
  @keyframes floatcrit {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.4) rotate(-3deg); }
    12%  { opacity: 1; transform: translate(-50%, -70%) scale(1.4) rotate(2deg); }
    30%  { opacity: 1; transform: translate(-50%, -85%) scale(1.1) rotate(-1deg); }
    100% { opacity: 0; transform: translate(-50%, -200%) scale(1) rotate(0); }
  }

  /* === BOTTOM PANEL === */
  .panel {
    padding: 22px 32px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: end;
    background: linear-gradient(0deg, rgba(0,0,0,0.95), rgba(0,0,0,0.3));
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.06);
    z-index: 10;
  }
  .resource {
    display: flex; flex-direction: column; gap: 8px;
    max-width: 520px;
  }
  .res-header {
    display: flex; align-items: baseline; gap: 12px;
  }
  .res-label {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.25em; text-transform: uppercase;
  }
  .res-rate {
    font-size: 11px; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .res-value {
    font-family: var(--serif); font-style: italic;
    font-size: 28px;
    font-variant-numeric: tabular-nums;
  }
  .res-value .total { color: var(--muted); font-size: 18px; }
  .res-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }
  .res-fill {
    height: 100%; background: var(--accent);
    width: 0%;
    transition: width 0.15s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  .upgrades {
    display: flex; flex-direction: column; gap: 6px;
    align-items: stretch; min-width: 280px;
  }
  .upgrade {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 10px 14px;
    cursor: pointer;
    font-family: var(--mono); font-size: 11px;
    color: var(--fg);
    transition: all 0.15s;
    text-align: left;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 2px 12px;
  }
  .upgrade:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(255,255,255,0.05);
    transform: translateX(-2px);
  }
  .upgrade:disabled { opacity: 0.35; cursor: not-allowed; }
  .upg-name { font-weight: 500; }
  .upg-cost {
    color: var(--accent); font-variant-numeric: tabular-nums;
    font-weight: 700;
  }
  .upg-effect {
    grid-column: 1 / -1;
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.1em;
  }

  .condense {
    background: var(--accent); color: #000;
    padding: 14px 20px;
    font-family: var(--mono); font-size: 12px;
    font-weight: 700; letter-spacing: 0.25em;
    cursor: pointer; border: none;
    margin-bottom: 8px;
    animation: pulse 1.6s ease-in-out infinite;
    transition: transform 0.1s;
  }
  .condense:hover { transform: scale(1.02); }
  .condense:active { transform: scale(0.98); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,102,68,0.6); }
    50% { box-shadow: 0 0 0 16px rgba(255,102,68,0); }
  }

  /* === QUOTE OVERLAY === */
  .quote-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.96);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; z-index: 100;
    padding: 48px;
    opacity: 0; pointer-events: none;
    transition: opacity 1s ease;
  }
  .quote-overlay.show { opacity: 1; pointer-events: all; }
  .quote-overlay::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, var(--accent), transparent 70%);
    opacity: 0.08;
    pointer-events: none;
  }
  .q-stage {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--muted);
    margin-bottom: 12px;
    z-index: 1;
  }
  .q-time {
    font-family: var(--mono);
    font-size: 16px; color: var(--accent);
    margin-bottom: 40px; z-index: 1;
    font-variant-numeric: tabular-nums;
  }
  .q-text {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(28px, 4vw, 52px);
    line-height: 1.3;
    max-width: 980px;
    text-align: center; color: var(--fg);
    font-weight: 400; z-index: 1;
  }
  .q-attr {
    font-family: var(--mono);
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.25em; margin-top: 36px;
    text-transform: uppercase; z-index: 1;
  }
  .q-continue {
    margin-top: 56px;
    background: transparent; color: var(--fg);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 14px 36px;
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.35em;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 1;
  }
  .q-continue:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 24px rgba(255,102,68,0.3);
  }

  /* === FINAL === */
  .complete {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
    padding: 48px; z-index: 5;
  }
  .complete h2 {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 400; margin-bottom: 24px;
    max-width: 720px; line-height: 1.4;
  }
  .complete p {
    font-size: 11px; color: var(--muted);
    line-height: 1.7; letter-spacing: 0.1em;
    max-width: 480px;
  }
  .complete-stats {
    margin-top: 32px; padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; gap: 32px;
    font-size: 11px; color: var(--muted);
  }
  .complete-stats strong {
    display: block; color: var(--accent);
    font-size: 20px; margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="app">
  <header class="timeline">
    <div class="tl-label">Cosmic Time</div>
    <div class="tl-bar">
      <div class="tl-fill" id="tl-fill"></div>
      <div class="tl-marker" id="tl-marker" style="left: 0%"></div>
    </div>
    <div class="tl-time" id="tl-time">10⁻¹² s</div>
    <div class="entropy-block">
      <div class="entropy-label">Entropy</div>
      <div class="entropy-value"><span id="entropy">0</span> k<sub>B</sub></div>
    </div>
    <div class="combo-block" id="combo-block">
      <div class="combo-label">Combo</div>
      <div class="combo-value">×<span id="combo-mult">1.00</span></div>
    </div>
  </header>

  <main class="field" id="field">
    <canvas id="canvas"></canvas>
    <div class="stage-info">
      <div class="stage-num" id="stage-num">STAGE 01 / 12</div>
      <div class="stage-name" id="stage-name">Quark-Gluon Plasma</div>
    </div>
    <div class="stage-hint" id="stage-hint">click to gather · click direction steers your universe</div>
  </main>

  <footer class="panel">
    <div class="resource">
      <div class="res-header">
        <span class="res-label" id="res-label">Quarks</span>
        <span class="res-rate" id="rate">+0.0/s</span>
      </div>
      <div class="res-value">
        <span id="quanta">0</span><span class="total"> / <span id="threshold">40</span></span>
      </div>
      <div class="res-bar"><div class="res-fill" id="res-fill"></div></div>
    </div>
    <div class="upgrades" id="upgrades"></div>
  </footer>
</div>

<div class="quote-overlay" id="quote">
  <div class="q-stage" id="q-stage"></div>
  <div class="q-time" id="q-time"></div>
  <div class="q-text" id="q-text"></div>
  <div class="q-attr" id="q-attr"></div>
  <button class="q-continue" id="q-continue">CONTINUE →</button>
</div>

<script>
// ===================================================================
// STAGE DATA
// ===================================================================
const STAGES = [
  {
    name: "Quark-Gluon Plasma",
    resource: "Quarks",
    time: "10⁻¹² s",
    timelinePos: 2,
    accent: "#ff6644",
    coreColor: "#ffaa66",
    particleColors: ["#ff4422", "#ffaa00", "#ffeebb"],
    threshold: 40,
    upgrades: [
      { name: "Gluon Bond",      cost: 6,   rate: 0.5 },
      { name: "Plasma Pump",     cost: 30,  rate: 1.5 },
      { name: "Color Confiner",  cost: 100, rate: 5.0 }
    ],
    quote: "Before there was matter, there was only fire. Quarks roam free, dancing in a sea of pure energy too hot for atoms to exist.",
    quoteAttr: "PLACEHOLDER · SWAP WITH VIDEO QUOTE"
  },
  {
    name: "Nucleosynthesis",
    resource: "Nuclei",
    time: "3 minutes",
    timelinePos: 10,
    accent: "#ffb84d",
    coreColor: "#ffdd88",
    particleColors: ["#ff8800", "#ffcc44", "#ffeeaa"],
    threshold: 120,
    upgrades: [
      { name: "Fusion Cycle",     cost: 15,  rate: 0.6 },
      { name: "Deuterium Trap",   cost: 60,  rate: 2.5 },
      { name: "Helium Forge",     cost: 200, rate: 8.0 }
    ],
    quote: "The fire cools just enough. Quarks bind. The first nuclei — hydrogen, deuterium, helium — emerge from the chaos in a brief window of three minutes.",
    quoteAttr: "PLACEHOLDER · SWAP WITH VIDEO QUOTE"
  },
  {
    name: "Recombination",
    resource: "Atoms",
    time: "380,000 yr",
    timelinePos: 22,
    accent: "#5fb4ff",
    coreColor: "#88ccff",
    particleColors: ["#1166aa", "#44aaee", "#aaddff"],
    threshold: 300,
    upgrades: [
      { name: "Electron Capture",  cost: 25,  rate: 1.0 },
      { name: "Photon Decoupler",  cost: 100, rate: 4.0 },
      { name: "Recombiner Array",  cost: 350, rate: 14.0 }
    ],
    quote: "Electrons fall captive to nuclei. Light, freed at last from the plasma's grip, streams across a transparent universe — the cosmic microwave background.",
    quoteAttr: "PLACEHOLDER · SWAP WITH VIDEO QUOTE"
  },
  {
    name: "First Stars",
    terminal: true,
    quote: "The MVP ends here. The next nine stages — first stars, galaxies, life, the death of the sun, the long degenerate dark, and beyond — await your build.",
    quoteAttr: "END OF PROTOTYPE"
  }
];

// ===================================================================
// ROGUE TYPES (encounters)
// ===================================================================
const ROGUE_TYPES = {
  minor: {
    weight: 60, r: 8,   bonusMult: 0.4,  entropyBonus: 1,
    color: "#88ddff", glowColor: "#aaeeff",
    name: "Wandering Quantum"
  },
  major: {
    weight: 32, r: 18,  bonusMult: 1.8,  entropyBonus: 4,
    color: "#ffcc66", glowColor: "#ffee99",
    name: "Stellar Fragment"
  },
  massive: {
    weight: 8,  r: 36,  bonusMult: 6.0,  entropyBonus: 14,
    color: "#ff7755", glowColor: "#ffaa88",
    name: "Rogue Mass"
  }
};

// ===================================================================
// STATE
// ===================================================================
let state = {
  stageIdx: 0,
  quanta: 0,
  autoLevels: [0, 0, 0],
  entropy: 0,
  totalClicks: 0,
  collisions: 0,

  // particle systems
  particles: [],   // orbiting matter (around core)
  flyers: [],      // click + auto-gather streamers (toward core)
  bursts: [],      // click explosion debris
  stars: [],       // background parallax
  rogues: [],      // wandering encounters
  wakeTrails: [],  // motion wake behind core

  burstWave: null,
  imploding: false,

  combo: 0,
  lastClick: 0,

  // camera (core stays at screen center, world drifts)
  coreVX: 0,
  coreVY: 0,
  driftAngle: Math.random() * Math.PI * 2,

  rogueCooldown: 18000  // first encounter ~18s in
};

let autoStreakCooldown = 0;

// ===================================================================
// DOM
// ===================================================================
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const field = $('field');
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = field.clientWidth  * dpr;
  canvas.height = field.clientHeight * dpr;
  canvas.style.width  = field.clientWidth + 'px';
  canvas.style.height = field.clientHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => {
  resizeCanvas();
  resetParticles();
  spawnStars();
});

function hexRGBA(hex, a) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

function pickRogueType() {
  const total = Object.values(ROGUE_TYPES).reduce((s, t) => s + t.weight, 0);
  let roll = Math.random() * total;
  for (const [key, type] of Object.entries(ROGUE_TYPES)) {
    roll -= type.weight;
    if (roll <= 0) return key;
  }
  return 'minor';
}

// ===================================================================
// STARFIELD — parallax background
// ===================================================================
function spawnStars() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  state.stars = [];
  // 3 layers (depth = parallax factor)
  const layers = [
    { count: 100, depth: 0.15, rMin: 0.4, rMax: 1.0, alphaMin: 0.15, alphaMax: 0.4 },
    { count: 70,  depth: 0.40, rMin: 0.6, rMax: 1.4, alphaMin: 0.25, alphaMax: 0.6 },
    { count: 35,  depth: 0.80, rMin: 0.8, rMax: 1.8, alphaMin: 0.35, alphaMax: 0.85 }
  ];
  layers.forEach(L => {
    for (let i = 0; i < L.count; i++) {
      state.stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: L.rMin + Math.random() * (L.rMax - L.rMin),
        a: L.alphaMin + Math.random() * (L.alphaMax - L.alphaMin),
        depth: L.depth,
        twinkle: Math.random() * Math.PI * 2
      });
    }
  });
}

function updateStars(dt) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  state.stars.forEach(s => {
    s.x -= state.coreVX * s.depth;
    s.y -= state.coreVY * s.depth;
    s.twinkle += dt * 0.002;
    // wrap
    if (s.x < -5)    s.x = w + 5;
    if (s.x > w + 5) s.x = -5;
    if (s.y < -5)    s.y = h + 5;
    if (s.y > h + 5) s.y = -5;
  });
}

function drawStars() {
  state.stars.forEach(s => {
    const tw = (Math.sin(s.twinkle) * 0.2 + 0.8) * s.a;
    // streak when fast (motion blur)
    const speed = Math.hypot(state.coreVX, state.coreVY) * s.depth;
    if (speed > 0.4) {
      ctx.strokeStyle = `rgba(255,255,255,${tw * 0.6})`;
      ctx.lineWidth = s.r * 0.7;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + state.coreVX * s.depth * 3, s.y + state.coreVY * s.depth * 3);
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(255,255,255,${tw})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

// ===================================================================
// PARTICLES (around core)
// ===================================================================
function spawnParticleAtEdge(p) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const angle = Math.random() * Math.PI * 2;
  const radius = Math.max(w, h) * 0.55 + Math.random() * 80;
  p.x = cx + Math.cos(angle) * radius;
  p.y = cy + Math.sin(angle) * radius;
  const vT = 0.9 + Math.random() * 0.7;
  const dir = Math.random() < 0.5 ? 1 : -1;
  p.vx = -Math.sin(angle) * vT * dir;
  p.vy = Math.cos(angle) * vT * dir;
}

function resetParticles() {
  const stage = STAGES[state.stageIdx];
  if (!stage || !stage.particleColors) return;
  state.particles = [];
  for (let i = 0; i < 80; i++) {
    const p = {
      r: Math.random() * 2 + 0.5,
      color: stage.particleColors[Math.floor(Math.random() * stage.particleColors.length)],
      phase: Math.random() * Math.PI * 2,
      alpha: Math.random() * 0.5 + 0.4
    };
    spawnParticleAtEdge(p);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    p.x = Math.random() * w;
    p.y = Math.random() * h;
    state.particles.push(p);
  }
}

function updateParticles(dt) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const stage = STAGES[state.stageIdx];
  if (!stage || stage.terminal) return;

  const progress = Math.min(1, state.quanta / stage.threshold);
  const G = state.imploding ? 60 : 7 * (0.35 + progress * 1.8);
  const coreR = 14 + progress * 70;
  const captureR = coreR + 4;
  const dampening = state.imploding ? 0.97 : 0.992;

  state.particles.forEach(p => {
    const dx = cx - p.x, dy = cy - p.y;
    const d = Math.hypot(dx, dy);

    if (d < captureR && !state.imploding) {
      spawnParticleAtEdge(p);
      return;
    }

    const softD = Math.max(d, 35);
    const force = G / (softD * 0.3 + 8);
    p.vx += (dx / d) * force;
    p.vy += (dy / d) * force;

    p.vx *= dampening;
    p.vy *= dampening;

    const v = Math.hypot(p.vx, p.vy);
    const maxV = state.imploding ? 18 : 4.5;
    if (v > maxV) {
      p.vx = (p.vx / v) * maxV;
      p.vy = (p.vy / v) * maxV;
    }

    p.x += p.vx;
    p.y += p.vy;
    p.phase += dt * 0.0015;

    if (p.x < -200 || p.x > w + 200 || p.y < -200 || p.y > h + 200) {
      spawnParticleAtEdge(p);
    }
  });

  state.flyers = state.flyers.filter(f => {
    const dx = cx - f.x, dy = cy - f.y;
    const d = Math.hypot(dx, dy);
    if (d < 12) return false;
    const speed = (f.auto ? 5 : 7) + (1 / Math.max(d, 1)) * 350;
    f.x += (dx / d) * speed;
    f.y += (dy / d) * speed;
    f.life = (f.life || 1) - (f.auto ? 0.008 : 0.012);
    return f.life > 0;
  });

  state.bursts = state.bursts.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    b.vx *= 0.93;
    b.vy *= 0.93;
    b.life -= 0.025;
    return b.life > 0;
  });
}

// ===================================================================
// CORE MOVEMENT (camera)
// ===================================================================
function updateCore(dt) {
  // ambient slow drift — heading rotates very slowly
  state.driftAngle += dt * 0.00012;
  state.coreVX += Math.cos(state.driftAngle) * 0.012;
  state.coreVY += Math.sin(state.driftAngle) * 0.012;

  // dampening (so velocity doesn't accumulate forever)
  state.coreVX *= 0.985;
  state.coreVY *= 0.985;

  // velocity cap
  const v = Math.hypot(state.coreVX, state.coreVY);
  const maxV = 1.8;
  if (v > maxV) {
    state.coreVX = (state.coreVX / v) * maxV;
    state.coreVY = (state.coreVY / v) * maxV;
  }
}

// Wake trails (motion blur behind core)
function updateWake(dt) {
  const speed = Math.hypot(state.coreVX, state.coreVY);
  const stage = STAGES[state.stageIdx];
  if (!stage || stage.terminal) return;

  if (speed > 0.5 && state.wakeTrails.length < 60 && Math.random() < speed * 0.35) {
    const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
    const progress = Math.min(1, state.quanta / stage.threshold);
    const coreR = 14 + progress * 70;
    state.wakeTrails.push({
      x: cx - (state.coreVX / speed) * coreR + (Math.random() - 0.5) * coreR,
      y: cy - (state.coreVY / speed) * coreR + (Math.random() - 0.5) * coreR,
      vx: -state.coreVX * (0.4 + Math.random() * 0.3) + (Math.random() - 0.5) * 0.3,
      vy: -state.coreVY * (0.4 + Math.random() * 0.3) + (Math.random() - 0.5) * 0.3,
      r: 1.5 + Math.random() * 1.5,
      life: 1,
      color: stage.coreColor
    });
  }

  state.wakeTrails = state.wakeTrails.filter(t => {
    t.x += t.vx;
    t.y += t.vy;
    t.life -= 0.015;
    return t.life > 0;
  });
}

// ===================================================================
// ROGUE OBJECTS
// ===================================================================
function spawnRogue() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const stage = STAGES[state.stageIdx];
  if (!stage || stage.terminal) return;

  // bias spawn angle toward direction of travel (70% chance)
  let baseAngle;
  const speed = Math.hypot(state.coreVX, state.coreVY);
  if (speed > 0.3 && Math.random() < 0.7) {
    baseAngle = Math.atan2(state.coreVY, state.coreVX) + (Math.random() - 0.5) * 1.2;
  } else {
    baseAngle = Math.random() * Math.PI * 2;
  }

  const r = Math.max(w, h) * 0.65;
  const sx = cx + Math.cos(baseAngle) * r;
  const sy = cy + Math.sin(baseAngle) * r;

  // trajectory: aim somewhere through the central area
  const targetX = cx + (Math.random() - 0.5) * w * 0.5;
  const targetY = cy + (Math.random() - 0.5) * h * 0.5;
  const dx = targetX - sx, dy = targetY - sy;
  const d = Math.hypot(dx, dy);
  const moveSpeed = 0.5 + Math.random() * 0.5;

  const typeKey = pickRogueType();
  const type = ROGUE_TYPES[typeKey];

  // bonus scales with current stage threshold
  const bonus = Math.round(stage.threshold * type.bonusMult * (0.3 + Math.random() * 0.3));

  state.rogues.push({
    x: sx, y: sy,
    vx: (dx / d) * moveSpeed,
    vy: (dy / d) * moveSpeed,
    typeKey,
    r: type.r,
    color: type.color,
    glowColor: type.glowColor,
    name: type.name,
    bonus,
    entropyBonus: type.entropyBonus,
    age: 0,
    spotted: false,
    rotation: 0
  });
}

function updateRogues(dt) {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const stage = STAGES[state.stageIdx];
  if (!stage || stage.terminal) return;

  const progress = Math.min(1, state.quanta / stage.threshold);
  const coreR = 14 + progress * 70;

  // encounter spawn timer
  state.rogueCooldown -= dt;
  if (state.rogueCooldown <= 0 && !state.imploding) {
    spawnRogue();
    state.rogueCooldown = 10000 + Math.random() * 15000; // 10–25s next
  }

  state.rogues = state.rogues.filter(rg => {
    // motion: own velocity + camera drift (rogues are in world space)
    rg.x += rg.vx - state.coreVX;
    rg.y += rg.vy - state.coreVY;
    rg.age += dt;
    rg.rotation += dt * 0.001;

    const dx = cx - rg.x, dy = cy - rg.y;
    const d = Math.hypot(dx, dy);

    // collision
    if (d < coreR + rg.r) {
      handleCollision(rg);
      return false;
    }

    // detect: first time entering screen
    const onScreen = rg.x > 0 && rg.x < w && rg.y > 0 && rg.y < h;
    if (onScreen && !rg.spotted) {
      rg.spotted = true;
      showEncounterAlert(rg);
    }

    // expire if too old or way off screen
    if (rg.age > 35000) return false;
    if (Math.hypot(rg.x - cx, rg.y - cy) > Math.max(w, h) * 1.6) return false;

    return true;
  });
}

function handleCollision(rg) {
  state.quanta += rg.bonus;
  state.entropy += rg.entropyBonus;
  state.collisions++;

  const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;

  // bursts
  const burstCount = rg.typeKey === 'massive' ? 30 : (rg.typeKey === 'major' ? 16 : 8);
  for (let i = 0; i < burstCount; i++) {
    const angle = (i / burstCount) * Math.PI * 2 + Math.random() * 0.4;
    const speed = (rg.typeKey === 'massive' ? 7 : 4) + Math.random() * 3;
    state.bursts.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2.5 + Math.random() * 2.5,
      life: 1,
      color: rg.color
    });
  }

  // wave
  state.burstWave = { t: performance.now() };

  // text + shake
  const txt = `+${rg.bonus} · ${rg.name.toUpperCase()}`;
  spawnFloatText(cx, cy - 20, txt, 'collision');

  $('app').classList.add(rg.typeKey === 'massive' ? 'shake-big' : 'shake');
  setTimeout(() => {
    $('app').classList.remove('shake', 'shake-big');
  }, rg.typeKey === 'massive' ? 700 : 550);
}

function drawRogues() {
  const t = performance.now();
  state.rogues.forEach(rg => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    const onScreen = rg.x > -50 && rg.x < w + 50 && rg.y > -50 && rg.y < h + 50;
    if (!onScreen) return;

    const pulse = 1 + Math.sin(t / 350 + rg.rotation * 5) * 0.15;

    // outer glow
    const gradR = rg.r * 3.5;
    const grad = ctx.createRadialGradient(rg.x, rg.y, 0, rg.x, rg.y, gradR);
    grad.addColorStop(0,    hexRGBA(rg.glowColor, 0.55));
    grad.addColorStop(0.4,  hexRGBA(rg.color, 0.25));
    grad.addColorStop(1,    hexRGBA(rg.color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(rg.x, rg.y, gradR, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.shadowBlur = 18;
    ctx.shadowColor = rg.color;
    ctx.fillStyle = rg.color;
    ctx.beginPath();
    ctx.arc(rg.x, rg.y, rg.r * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // bright core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(rg.x, rg.y, Math.max(1.5, rg.r * 0.25), 0, Math.PI * 2);
    ctx.fill();

    // type-specific decoration
    if (rg.typeKey === 'major') {
      // 2 orbiting satellites
      for (let i = 0; i < 2; i++) {
        const a = rg.rotation * 4 + i * Math.PI;
        const sx = rg.x + Math.cos(a) * rg.r * 1.7;
        const sy = rg.y + Math.sin(a) * rg.r * 1.7;
        ctx.fillStyle = hexRGBA('#ffffff', 0.85);
        ctx.beginPath();
        ctx.arc(sx, sy, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (rg.typeKey === 'massive') {
      // crackling energy spikes
      ctx.strokeStyle = hexRGBA('#ffffff', 0.7 + Math.sin(t/80) * 0.3);
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        const a = rg.rotation * 2 + i * Math.PI * 0.4 + Math.sin(t/120 + i) * 0.3;
        const len = rg.r * (1.4 + Math.sin(t/100 + i) * 0.3);
        ctx.beginPath();
        ctx.moveTo(rg.x, rg.y);
        ctx.lineTo(rg.x + Math.cos(a) * len, rg.y + Math.sin(a) * len);
        ctx.stroke();
      }
    }
  });
}

// off-screen indicators (edge-clamped triangles)
function drawRogueIndicators() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const margin = 24;

  state.rogues.forEach(rg => {
    const onScreen = rg.x > 0 && rg.x < w && rg.y > 0 && rg.y < h;
    if (onScreen) return;

    const dx = rg.x - cx, dy = rg.y - cy;
    const angle = Math.atan2(dy, dx);

    // intersect with viewport rect
    const halfW = w / 2 - margin, halfH = h / 2 - margin;
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    const tx = halfW / Math.abs(cosA);
    const ty = halfH / Math.abs(sinA);
    const tt = Math.min(tx, ty);
    const ix = cx + cosA * tt;
    const iy = cy + sinA * tt;

    const pulse = 1 + Math.sin(performance.now() / 220) * 0.25;

    ctx.save();
    ctx.translate(ix, iy);
    ctx.rotate(angle);

    ctx.shadowBlur = 14;
    ctx.shadowColor = rg.color;
    ctx.fillStyle = rg.color;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-14 * pulse, -7);
    ctx.lineTo(-14 * pulse, 7);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // small label distance bar
    const dist = Math.hypot(dx, dy);
    const intensity = Math.max(0, 1 - dist / (Math.max(w, h) * 1.2));
    if (intensity > 0.2) {
      ctx.fillStyle = hexRGBA(rg.color, intensity * 0.4);
      ctx.fillRect(-22, -1, 6, 2);
    }

    ctx.restore();
  });
}

// ===================================================================
// DRAW
// ===================================================================
function drawScene() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const stage = STAGES[state.stageIdx];

  ctx.clearRect(0, 0, w, h);
  if (!stage || stage.terminal) return;

  // 1. background stars (parallax)
  drawStars();

  // 2. wake trails (behind core)
  state.wakeTrails.forEach(t => {
    ctx.fillStyle = hexRGBA(t.color, t.life * 0.5);
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r * t.life, 0, Math.PI * 2);
    ctx.fill();
  });

  const progress = Math.min(1, state.quanta / stage.threshold);

  // 3. central glow
  const glowR = Math.max(w, h) * 0.5;
  const glowGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  glowGrad.addColorStop(0, hexRGBA(stage.accent, 0.10 + progress * 0.06));
  glowGrad.addColorStop(0.5, hexRGBA(stage.accent, 0.03));
  glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, w, h);

  // 4. gravitational lensing rings (high progress)
  if (progress > 0.3) {
    ctx.strokeStyle = hexRGBA(stage.accent, 0.06 * progress);
    ctx.lineWidth = 1;
    for (let i = 1; i <= 3; i++) {
      ctx.beginPath();
      ctx.arc(cx, cy, 60 * i + Math.sin(performance.now() / 1200 + i) * 4, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // 5. ambient orbiting particles
  state.particles.forEach(p => {
    const a = (Math.sin(p.phase) * 0.3 + 0.7) * p.alpha;
    ctx.fillStyle = hexRGBA(p.color, a);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    const v = Math.hypot(p.vx, p.vy);
    if (v > 1.5) {
      ctx.strokeStyle = hexRGBA(p.color, a * 0.4);
      ctx.lineWidth = p.r * 0.8;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 2.5, p.y - p.vy * 2.5);
      ctx.stroke();
    }
  });

  // 6. rogue objects (on-screen)
  drawRogues();

  // 7. central core
  const coreR = 14 + progress * 70;
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 2.2);
  coreGrad.addColorStop(0,    hexRGBA(stage.coreColor, 0.95));
  coreGrad.addColorStop(0.25, hexRGBA(stage.accent, 0.6));
  coreGrad.addColorStop(0.6,  hexRGBA(stage.accent, 0.15));
  coreGrad.addColorStop(1,    hexRGBA(stage.accent, 0));
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreR * 2.2, 0, Math.PI * 2);
  ctx.fill();

  const pulse = progress > 0.5
    ? 1 + Math.sin(performance.now() / 200) * 0.15 * (progress - 0.5) * 2
    : 1;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, Math.max(2.5, coreR * 0.18 * pulse), 0, Math.PI * 2);
  ctx.fill();

  // 8. threshold ring
  if (state.quanta >= stage.threshold && !state.imploding) {
    const tt = performance.now() / 600;
    const ringR = coreR * 1.5 + Math.sin(tt) * 8;
    ctx.strokeStyle = hexRGBA(stage.accent, 0.6 + Math.sin(tt) * 0.3);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 9. flyers (click + auto-streaks)
  state.flyers.forEach(f => {
    ctx.shadowBlur = 12;
    ctx.shadowColor = stage.accent;
    ctx.fillStyle = hexRGBA(stage.coreColor, f.life || 1);
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.auto ? 2 : 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // 10. click bursts
  state.bursts.forEach(b => {
    ctx.fillStyle = hexRGBA(b.color, b.life);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * b.life, 0, Math.PI * 2);
    ctx.fill();
  });

  // 11. condense / collision wave
  if (state.burstWave) {
    const age = (performance.now() - state.burstWave.t) / 1000;
    if (age < 1.5) {
      const waveR = age * 800;
      ctx.strokeStyle = hexRGBA(stage.accent, Math.max(0, 1 - age / 1.5));
      ctx.lineWidth = 6 * (1 - age / 1.5);
      ctx.beginPath();
      ctx.arc(cx, cy, waveR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = hexRGBA('#ffffff', Math.max(0, (1 - age / 1.5) * 0.5));
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, waveR * 0.6, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      state.burstWave = null;
    }
  }

  // 12. rogue edge indicators (on top of everything)
  drawRogueIndicators();
}

// ===================================================================
// CLICK / GATHER FX
// ===================================================================
function spawnFloatText(x, y, text, modifier) {
  const el = document.createElement('div');
  el.className = 'float-text' + (modifier ? ' ' + modifier : '');
  el.textContent = text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  $('field').appendChild(el);
  setTimeout(() => el.remove(), modifier === 'collision' ? 2000 : (modifier === 'crit' ? 1400 : 1000));
}

function spawnClickBurst(x, y, isCrit) {
  const stage = STAGES[state.stageIdx];
  const count = isCrit ? 14 : 5;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
    const speed = (isCrit ? 4.5 : 2.2) + Math.random() * 2;
    state.bursts.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 2,
      life: 1,
      color: isCrit ? '#ffffff' : stage.coreColor,
    });
  }
}

function showEncounterAlert(rg) {
  const el = document.createElement('div');
  el.className = 'encounter-alert';
  el.style.color = rg.color;
  el.innerHTML = `
    <div class="ea-tag">— Encounter —</div>
    <div class="ea-name">${rg.name}</div>
  `;
  $('field').appendChild(el);
  setTimeout(() => el.remove(), 1700);
}

// ===================================================================
// GAME LOGIC
// ===================================================================
function getRate() {
  const stage = STAGES[state.stageIdx];
  if (!stage || !stage.upgrades) return 0;
  let rate = 0;
  stage.upgrades.forEach((u, i) => { rate += state.autoLevels[i] * u.rate; });
  return rate;
}

function getCost(stageIdx, upgradeIdx) {
  const base = STAGES[stageIdx].upgrades[upgradeIdx].cost;
  const lvl = state.autoLevels[upgradeIdx];
  return Math.floor(base * Math.pow(1.45, lvl));
}

function getComboMult() {
  return 1 + Math.min(1.0, Math.floor(state.combo / 10) * 0.25);
}

function handleClick(x, y) {
  const now = performance.now();

  // combo
  if (now - state.lastClick < 700) state.combo++;
  else state.combo = 1;
  state.lastClick = now;

  // STEER: nudge core (camera) toward click direction
  const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
  const sdx = x - cx, sdy = y - cy;
  const sd = Math.hypot(sdx, sdy);
  if (sd > 0) {
    const nudge = 0.18;
    state.coreVX += (sdx / sd) * nudge;
    state.coreVY += (sdy / sd) * nudge;
    // also drift heading toward click direction (so ambient drift aligns)
    state.driftAngle = Math.atan2(sdy, sdx);
  }

  const comboMult = getComboMult();
  const critChance = 0.05 + Math.min(0.20, state.combo * 0.005);
  const isCrit = Math.random() < critChance;
  const critMult = isCrit ? 5 : 1;
  const total = Math.round(1 * comboMult * critMult);

  state.quanta += total;
  state.totalClicks++;

  spawnClickBurst(x, y, isCrit);
  const txt = isCrit
    ? `CRIT +${total}`
    : (comboMult > 1 ? `+${total} ×${comboMult.toFixed(2)}` : `+${total}`);
  spawnFloatText(x, y, txt, isCrit ? 'crit' : null);
  state.flyers.push({ x, y, life: 1 });

  renderUI();
}

function spawnAutoStreak() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const cx = w / 2, cy = h / 2;
  const angle = Math.random() * Math.PI * 2;
  const r = Math.max(w, h) * 0.5;
  state.flyers.push({
    x: cx + Math.cos(angle) * r,
    y: cy + Math.sin(angle) * r,
    life: 1,
    auto: true
  });
}

function buyUpgrade(idx) {
  const cost = getCost(state.stageIdx, idx);
  if (state.quanta >= cost) {
    state.quanta -= cost;
    state.autoLevels[idx]++;
    renderUI();
  }
}

function condense() {
  const stage = STAGES[state.stageIdx];
  const earned = Math.floor(Math.log2(state.quanta + 1) * 3);
  state.entropy += earned;

  state.imploding = true;
  state.burstWave = { t: performance.now() };
  $('app').classList.add('shake');
  setTimeout(() => $('app').classList.remove('shake'), 550);

  setTimeout(() => showQuote(stage), 900);
}

function nextStage() {
  hideQuote();
  state.imploding = false;
  state.stageIdx++;
  const stage = STAGES[state.stageIdx];

  if (!stage || stage.terminal) {
    showFinal();
    return;
  }

  state.quanta = 0;
  state.autoLevels = [0, 0, 0];
  state.combo = 0;
  state.coreVX = 0;
  state.coreVY = 0;
  state.rogues = [];
  state.rogueCooldown = 18000;
  state.wakeTrails = [];
  resetParticles();
  renderUI();
}

function showQuote(stage) {
  $('q-stage').textContent = `STAGE ${String(state.stageIdx + 1).padStart(2, '0')} → ${String(state.stageIdx + 2).padStart(2, '0')}`;
  $('q-time').textContent = `t = ${stage.time}`;
  $('q-text').textContent = '"' + stage.quote + '"';
  $('q-attr').textContent = stage.quoteAttr;
  $('quote').classList.add('show');
}

function hideQuote() {
  $('quote').classList.remove('show');
}

function showFinal() {
  const stage = STAGES[STAGES.length - 1];
  $('field').innerHTML = `
    <div class="complete">
      <h2>"${stage.quote}"</h2>
      <p>${stage.quoteAttr}</p>
      <div class="complete-stats">
        <div><strong>${state.entropy}</strong>Entropy accumulated</div>
        <div><strong>${state.totalClicks}</strong>Clicks gathered</div>
        <div><strong>${state.collisions}</strong>Encounters survived</div>
        <div><strong>3 / 12</strong>Stages completed</div>
      </div>
    </div>
  `;
  document.querySelector('.panel').style.display = 'none';
}

// ===================================================================
// UI
// ===================================================================
function renderUI() {
  const stage = STAGES[state.stageIdx];
  if (!stage || stage.terminal) return;

  document.documentElement.style.setProperty('--accent', stage.accent);

  $('stage-num').textContent  = `STAGE ${String(state.stageIdx + 1).padStart(2, '0')} / 12`;
  $('stage-name').textContent = stage.name;
  $('res-label').textContent  = stage.resource;
  $('quanta').textContent     = Math.floor(state.quanta);
  $('threshold').textContent  = stage.threshold;
  $('rate').textContent       = `+${getRate().toFixed(1)}/s`;
  $('entropy').textContent    = state.entropy;
  $('tl-time').textContent    = stage.time;

  const pct = Math.min(100, (state.quanta / stage.threshold) * 100);
  $('res-fill').style.width   = pct + '%';
  $('tl-fill').style.width    = stage.timelinePos + '%';
  $('tl-marker').style.left   = stage.timelinePos + '%';

  if (state.combo > 1) {
    $('combo-block').classList.add('active');
    $('combo-mult').textContent = getComboMult().toFixed(2);
  } else {
    $('combo-block').classList.remove('active');
  }

  if (state.totalClicks > 0) $('stage-hint').style.display = 'none';

  const upgEl = $('upgrades');
  upgEl.innerHTML = '';

  if (state.quanta >= stage.threshold) {
    const btn = document.createElement('button');
    btn.className = 'condense';
    btn.textContent = '◆ CONDENSE → NEXT STAGE';
    btn.onclick = condense;
    upgEl.appendChild(btn);
  }

  stage.upgrades.forEach((u, i) => {
    const cost = getCost(state.stageIdx, i);
    const btn = document.createElement('button');
    btn.className = 'upgrade';
    btn.disabled = state.quanta < cost;
    btn.innerHTML = `
      <span class="upg-name">${u.name} <span style="color:var(--muted);font-weight:400">×${state.autoLevels[i]}</span></span>
      <span class="upg-cost">${cost}</span>
      <span class="upg-effect">+${u.rate}/s · per level</span>
    `;
    btn.onclick = () => buyUpgrade(i);
    upgEl.appendChild(btn);
  });
}

// ===================================================================
// INPUT
// ===================================================================
canvas.addEventListener('click', (e) => {
  if (state.imploding) return;
  const rect = canvas.getBoundingClientRect();
  handleClick(e.clientX - rect.left, e.clientY - rect.top);
});

$('q-continue').addEventListener('click', nextStage);

// ===================================================================
// MAIN LOOP
// ===================================================================
let lastT = performance.now();
let uiAccum = 0;
function loop(t) {
  const dt = Math.min(50, t - lastT);
  lastT = t;

  const stage = STAGES[state.stageIdx];

  if (stage && !stage.terminal && !state.imploding) {
    const rate = getRate();
    if (rate > 0) {
      state.quanta += (rate * dt) / 1000;
      autoStreakCooldown -= dt;
      if (autoStreakCooldown <= 0) {
        spawnAutoStreak();
        autoStreakCooldown = 1000 / Math.min(3, Math.max(0.5, rate));
      }
    }
  }

  if (state.combo > 1 && performance.now() - state.lastClick > 1200) {
    state.combo = 0;
    $('combo-block').classList.remove('active');
  }

  updateCore(dt);
  updateWake(dt);
  updateStars(dt);
  updateParticles(dt);
  updateRogues(dt);

  drawScene();

  uiAccum += dt;
  if (uiAccum > 100) {
    uiAccum = 0;
    renderUI();
  }

  requestAnimationFrame(loop);
}

// ===================================================================
// INIT
// ===================================================================
function init() {
  resizeCanvas();
  spawnStars();
  resetParticles();
  renderUI();
  requestAnimationFrame(loop);
}
init();
</script>
</body>
